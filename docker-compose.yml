x-app-common: &app-common
  build: .
  depends_on:
    db:
      condition: service_healthy
    pyroscope:
      condition: service_started
  environment:
    SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bankcards
    SPRING_DATASOURCE_USERNAME: bankcards
    SPRING_DATASOURCE_PASSWORD: bankcards
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    PYROSCOPE_APPLICATION_NAME: bankcards
    PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    PYROSCOPE_FORMAT: jfr
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
    interval: 5s
    timeout: 3s
    retries: 10
    start_period: 30s

services:
  db:
    image: postgres:16-alpine
    container_name: bankcards-db
    environment:
      POSTGRES_DB: bankcards
      POSTGRES_USER: bankcards
      POSTGRES_PASSWORD: bankcards
    ports:
      - "5432:5432"
    volumes:
      - bankcards-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankcards -d bankcards"]
      interval: 10s
      timeout: 5s
      retries: 5

  app1:
    <<: *app-common
    container_name: bankcards-app1
    hostname: app1

  app2:
    <<: *app-common
    container_name: bankcards-app2
    hostname: app2

  nginx:
    image: nginx:1.27-alpine
    container_name: bankcards-nginx
    restart: on-failure
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: bankcards-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - bankcards-prometheus-data:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.2.1
    container_name: bankcards-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - bankcards-loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: bankcards-tempo
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - bankcards-tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - prometheus

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: bankcards-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
      - "4317"
      - "4318"
    depends_on:
      - loki
      - prometheus
      - tempo

  pyroscope:
    image: grafana/pyroscope:2.1.1
    container_name: bankcards-pyroscope
    ports:
      - "4040:4040"
    volumes:
      - bankcards-pyroscope-data:/data

  grafana:
    image: grafana/grafana:11.3.1
    container_name: bankcards-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - bankcards-grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
      - pyroscope

volumes:
  bankcards-db-data:
  bankcards-prometheus-data:
  bankcards-loki-data:
  bankcards-tempo-data:
  bankcards-grafana-data:
  bankcards-pyroscope-data:
