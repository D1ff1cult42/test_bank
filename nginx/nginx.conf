events {}

http {
    upstream bankcards_app {
        least_conn;
        server app1:8080 max_fails=3 fail_timeout=10s;
        server app2:8080 max_fails=3 fail_timeout=10s;
    }

    log_format upstreamlog '$remote_addr - [$time_local] "$request" $status '
                            'upstream=$upstream_addr rt=$request_time';

    server {
        listen 8080;

        access_log /var/log/nginx/access.log upstreamlog;

        location / {
            proxy_pass http://bankcards_app;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Upstream-Addr $upstream_addr always;
        }
    }
}
