server:
  port: 8080

spring:
  application:
    name: bankcards
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankcards}
    username: ${SPRING_DATASOURCE_USERNAME:bankcards}
    password: ${SPRING_DATASOURCE_PASSWORD:bankcards}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/migration/db.changelog-master.yaml

auth:
  issuer: bankcards-auth
  access-token-expiration: 15m
  refresh-token-expiration: 7d
  cookie:
    secure: ${AUTH_COOKIE_SECURE:false} #false for dev
    same-site: Strict
  cors:
    # Список origin фронтенда (через запятую). Wildcard '*' с credentials недопустим.
    allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  csrf:
    # CSRF-защита (double-submit cookie). Можно отключить для отладки/stateless-клиентов.
    enabled: ${AUTH_CSRF_ENABLED:false}

jwt:
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}

card:
  # Срок действия выпускаемой карты (лет) и число попыток сгенерировать уникальный номер.
  validity-years: 4
  number-generation-attempts: 5
  encryption:
    # AES-256 ключ для шифрования номеров карт (Base64, 32 байта). Обязательно задать в проде.
    key: ${CARD_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  opentelemetry:
    resource-attributes:
      "service.instance.id": ${HOSTNAME:unknown}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
